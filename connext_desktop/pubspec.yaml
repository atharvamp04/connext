name: connext_desktop
description: Connext Desktop – Remote desktop and file transfer over Tailscale
publish_to: "none"

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_webrtc: ^1.2.1
  http: ^1.2.0
  web_socket_channel: ^3.0.1
  image: ^4.1.7
  shared_preferences: ^2.2.2
  
  screen_capture_plugin:
    path: ../screen_capture_plugin

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
